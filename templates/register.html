<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | AI Study Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="logo">🤖 AI Study Assistant</div>
            <h2>Yeni Hesap Oluştur</h2>
            <p class="subtitle">Yapay zekâ destekli çalışma alanına ilk adımı at.</p>

            <form action="#" method="POST">
                <div class="input-group">
                    <label for="username">Kullanıcı Adı</label>
                    <input type="text" id="username" name="username" placeholder="yazilimci_efe" required>
                </div>

                <div class="input-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" name="email" placeholder="ornek@eposta.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
    <label for="confirm_password">Şifre Tekrar</label>
    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
</div>

                <button type="submit" class="auth-btn">Kayıt Ol 🚀</button>
            </form>

            <div class="footer">
                Zaten üye misin? <a href="{{ url_for('login') }}">Giriş Yap</a>
            </div>
        </div>
    </div>

</body>
</html>
