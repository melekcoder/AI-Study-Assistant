<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sohbet - AI Study Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0b18; color: #e2e1e9; margin: 0; padding: 0; }
        .TumEkran { display: flex; height: 100vh; }
        .SolMenu { width: 250px; background-color: #110e25; padding: 20px; border-right: 2px solid #a40ae0; }
        .MenuBaslik { font-size: 20px; font-weight: bold; color: #ffffff; margin-bottom: 30px; text-align: center; }
        .SolMenu a { display: block; color: #b5b3bc; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 5px; }
        .SolMenu a:hover { color: #ffffff; background-color: #231c44; border-left: 4px solid #8a2be2; }
        .SagIcerik { flex: 1; padding: 30px; display: flex; flex-direction: column; height: 100vh; }
        
        
        .SohbetAlani { flex: 1; background-color: #16122c; border: 1px solid rgba(138, 43, 226, 0.2); border-radius: 12px; padding: 20px; overflow-y: auto; margin-bottom: 20px; }
        .MesajSatiri { display: block; margin-bottom: 15px; clear: both; }
        .Mesaj { padding: 12px 16px; border-radius: 15px; max-width: 70%; display: inline-block; word-wrap: break-word; }
        
      
        .KullaniciMesaj { background-color: #8a2be2; color: #ffffff; float: right; border-bottom-right-radius: 2px; }
      
        .AiMesaj { background-color: #231c44; color: #e2e1e9; float: left; border-bottom-left-radius: 2px; border: 1px solid rgba(138, 43, 226, 0.3); }
        
        
        .GirdiAlani { display: flex; gap: 10px; background-color: #110e25; padding: 10px; border-radius: 10px; border: 1px solid rgba(138, 43, 226, 0.2); }
        .GirdiAlani input { flex: 1; background-color: transparent; border: none; color: #ffffff; padding: 10px; outline: none; }
        .GirdiAlani button { background-color: #a40ae0; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .GirdiAlani button:hover { background-color: #8a2be2; }
    </style>
</head>
<body>
    <div class="TumEkran">
        <div class="SolMenu">
            <div class="MenuBaslik">🧠 AI Study Assist</div>
            <a href="/dashboard">🏠 Dashboard</a>
            <a href="/derslerim">📚 Derslerim</a>
            <a href="/ai_sohbet" style="color: #ffffff; background-color: #231c44; border-left: 4px solid #8a2be2;">🤖 AI Sohbet</a>
            <a href="#">⚙️ Ayarlar</a>
            <br><br>
            <a href="#" style="color: #ff4d6d;">🚪 Çıkış Yap</a>
        </div>

        <div class="SagIcerik">
            <h2 class="mb-1">🤖 AI Ders Asistanı</h2>
            <p class="text-muted mb-3">Anlamadığın konuları sor, senin için özetlesin veya sorularını çözsün.</p>
            
            <div class="SohbetAlani">
                {% for mesaj in sohbet_gecmisi %}
                <div class="MesajSatiri">
                    <div class="Mesaj {% if mesaj.gonderen == 'kullanici' %}KullaniciMesaj{% else %}AiMesaj{% endif %}">
                        {{ mesaj.metin }}
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="GirdiAlani">
                <input type="text" placeholder="Yapay zekaya bir soru sor... (Örn: C++ Polimorfizm nedir?)">
                <button>Gönder</button>
            </div>
        </div>
    </div>
</body>
</html>
